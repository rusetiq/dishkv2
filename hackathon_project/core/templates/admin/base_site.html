{% extends "admin/base.html" %}
{% load i18n %}

{% block title %}DIS Admin — {{ title }}{% endblock %}

{% block branding %}
<div id="site-name">
    <a href="{% url 'admin:index' %}" style="display:flex;align-items:center;gap:10px;text-decoration:none;">
        <div style="width:32px;height:32px;border:1.5px solid rgba(108,140,255,0.6);border-radius:8px;display:flex;align-items:center;justify-content:center;">
            <svg viewBox="0 0 22 22" fill="none" width="16" height="16">
                <polyline points="8,4 2,11 8,18" stroke="#6c8cff" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
                <polyline points="14,4 20,11 14,18" stroke="#ff8a4c" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
            </svg>
        </div>
        <span style="font-family:'Space Grotesk',system-ui,sans-serif;font-weight:800;font-size:15px;color:#fff;">DIS <span style="background:linear-gradient(135deg,#6c8cff,#ff8a4c);-webkit-background-clip:text;background-clip:text;color:transparent;">ADMIN</span></span>
    </a>
</div>
{% endblock %}

{% block nav-global %}
{% load static %}
<link rel="stylesheet" href="{% static 'css/admin-fonts.css' %}">
<style>
:root {
    --bg: #0d0f1a;
    --surface: #161a2c;
    --surface-2: #1d2238;
    --border: rgba(255,255,255,0.08);
    --primary: #6c8cff;
    --accent: #ff8a4c;
    --success: #4ade80;
    --danger: #ff5d6c;
    --text: #f5f7ff;
    --muted: #8b91ad;
}
body {
    font-family: 'Inter', system-ui, -apple-system, sans-serif !important;
    background: var(--bg) !important;
    color: var(--text) !important;
}
#header {
    background: linear-gradient(135deg, rgba(22,26,44,0.98), rgba(13,15,26,0.98)) !important;
    border-bottom: 1px solid rgba(108,140,255,0.2) !important;
    padding: 0 24px !important;
    height: 60px !important;
    display: flex !important;
    align-items: center !important;
    backdrop-filter: blur(20px) !important;
    box-shadow: 0 4px 24px rgba(0,0,0,0.4) !important;
}
#header a:link, #header a:visited { color: var(--text) !important; }
#user-tools { font-size: 12px !important; color: var(--muted) !important; }
#user-tools a { color: var(--primary) !important; }
#site-name a { color: var(--text) !important; }
.module h2, .module caption, .inline-group h2 {
    background: linear-gradient(135deg, rgba(29,34,56,0.9), rgba(22,26,44,0.8)) !important;
    color: var(--text) !important;
    border-bottom: 1px solid var(--border) !important;
    font-family: 'Space Grotesk', sans-serif !important;
    font-weight: 700 !important;
    letter-spacing: -0.01em !important;
    padding: 14px 16px !important;
}
.module {
    background: rgba(22,26,44,0.6) !important;
    border: 1px solid var(--border) !important;
    border-radius: 14px !important;
    overflow: hidden !important;
    backdrop-filter: blur(12px) !important;
    margin-bottom: 20px !important;
    box-shadow: 0 8px 32px -8px rgba(0,0,0,0.5) !important;
}
#content {
    background: transparent !important;
    padding: 24px !important;
}
#content-main {
    background: transparent !important;
}
#content h1 {
    font-family: 'Space Grotesk', sans-serif !important;
    font-weight: 800 !important;
    color: var(--text) !important;
    font-size: 24px !important;
    letter-spacing: -0.02em !important;
    margin-bottom: 20px !important;
}
.colMS #content-related { background: transparent !important; }
#content-related h2 { font-family: 'Space Grotesk', sans-serif !important; color: var(--muted) !important; font-size: 11px !important; letter-spacing: 0.14em !important; text-transform: uppercase !important; }
#content-related .module {
    background: rgba(22,26,44,0.5) !important;
}
a:link, a:visited { color: var(--primary) !important; }
a:hover { color: #a5b8ff !important; }
.button, input[type=submit], input[type=button], .submit-row input, a.button {
    background: linear-gradient(135deg, #6c8cff, #5a7aff) !important;
    color: #0d0f1a !important;
    border: none !important;
    border-radius: 8px !important;
    font-weight: 700 !important;
    font-family: 'Inter', sans-serif !important;
    padding: 8px 16px !important;
    cursor: pointer !important;
    transition: all 0.2s !important;
    box-shadow: 0 4px 12px rgba(108,140,255,0.3) !important;
}
.button:hover, input[type=submit]:hover, input[type=button]:hover { transform: translateY(-1px) !important; box-shadow: 0 6px 20px rgba(108,140,255,0.4) !important; }
.deletelink, a.deletelink { background: rgba(255,93,108,0.15) !important; color: var(--danger) !important; border: 1px solid rgba(255,93,108,0.3) !important; border-radius: 8px !important; }
.deletelink:hover { background: rgba(255,93,108,0.25) !important; }
input[type=text], input[type=password], input[type=email], input[type=url], input[type=number], textarea, select {
    background: rgba(13,15,26,0.8) !important;
    border: 1px solid var(--border) !important;
    color: var(--text) !important;
    border-radius: 8px !important;
    font-family: 'Inter', sans-serif !important;
    padding: 8px 12px !important;
    transition: border-color 0.2s !important;
}
input[type=text]:focus, textarea:focus, select:focus { border-color: var(--primary) !important; outline: none !important; box-shadow: 0 0 0 3px rgba(108,140,255,0.15) !important; }
#changelist-filter {
    background: rgba(22,26,44,0.5) !important;
    border-left: 1px solid var(--border) !important;
}
#changelist-filter h2 { background: transparent !important; border-bottom: 1px solid var(--border) !important; color: var(--muted) !important; font-size: 10px !important; text-transform: uppercase !important; letter-spacing: 0.14em !important; }
#changelist-filter li.selected a { color: var(--primary) !important; }
table {
    border-radius: 12px !important;
    overflow: hidden !important;
}
thead th {
    background: rgba(13,15,26,0.6) !important;
    color: var(--muted) !important;
    font-size: 11px !important;
    font-weight: 700 !important;
    letter-spacing: 0.1em !important;
    text-transform: uppercase !important;
    border-bottom: 1px solid var(--border) !important;
}
tbody tr { background: transparent !important; }
tbody tr:hover { background: rgba(108,140,255,0.05) !important; }
td, th { border-color: var(--border) !important; color: var(--text) !important; }
.paginator a, .paginator span { color: var(--primary) !important; }
#nav-sidebar { background: rgba(13,15,26,0.95) !important; border-right: 1px solid var(--border) !important; }
.toggle-nav-sidebar-icon { color: var(--primary) !important; }
.app-platform_app.model-problem.active a { color: var(--accent) !important; }
.breadcrumbs {
    background: transparent !important;
    border-bottom: 1px solid var(--border) !important;
    color: var(--muted) !important;
    font-size: 12px !important;
    padding: 10px 24px !important;
}
.breadcrumbs a { color: var(--primary) !important; }
.success, .warning, .errornote {
    border-radius: 10px !important;
    font-family: 'Inter', sans-serif !important;
    font-size: 13px !important;
    border: none !important;
}
.success { background: rgba(74,222,128,0.1) !important; color: #4ade80 !important; border-left: 3px solid #4ade80 !important; }
.errornote { background: rgba(255,93,108,0.1) !important; color: #ff5d6c !important; border-left: 3px solid #ff5d6c !important; }
.submit-row {
    background: rgba(22,26,44,0.6) !important;
    border-top: 1px solid var(--border) !important;
    border-radius: 0 0 14px 14px !important;
    padding: 14px 16px !important;
}
.help {
    color: var(--muted) !important;
    font-size: 12px !important;
}
.dashboard-quick-actions {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
    gap: 12px;
    margin-bottom: 24px;
}
.qa-btn {
    display: flex;
    align-items: center;
    gap: 12px;
    padding: 16px 20px;
    border-radius: 14px;
    border: 1px solid var(--border);
    background: rgba(22,26,44,0.6);
    color: var(--text);
    text-decoration: none !important;
    font-weight: 700;
    font-size: 14px;
    font-family: 'Inter', sans-serif;
    transition: all 0.2s;
    cursor: pointer;
    backdrop-filter: blur(12px);
}
.qa-btn:hover {
    border-color: rgba(108,140,255,0.4) !important;
    background: rgba(108,140,255,0.1) !important;
    color: var(--text) !important;
    transform: translateY(-2px);
    box-shadow: 0 8px 24px rgba(108,140,255,0.2);
}
.qa-btn.danger:hover {
    border-color: rgba(255,93,108,0.4) !important;
    background: rgba(255,93,108,0.1) !important;
    box-shadow: 0 8px 24px rgba(255,93,108,0.2);
}
.qa-btn.success-btn:hover {
    border-color: rgba(74,222,128,0.4) !important;
    background: rgba(74,222,128,0.1) !important;
    box-shadow: 0 8px 24px rgba(74,222,128,0.2);
}
.qa-icon {
    width: 36px;
    height: 36px;
    border-radius: 10px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 18px;
    flex-shrink: 0;
}
.qa-icon.blue { background: rgba(108,140,255,0.15); }
.qa-icon.green { background: rgba(74,222,128,0.15); }
.qa-icon.red { background: rgba(255,93,108,0.15); }
.qa-icon.gold { background: rgba(255,215,0,0.15); }
.qa-label { display: flex; flex-direction: column; gap: 2px; }
.qa-label-main { font-weight: 700; font-size: 13px; }
.qa-label-sub { font-size: 11px; color: var(--muted); font-weight: 500; }
.url-quick-nav {
    display: flex;
    flex-wrap: wrap;
    gap: 8px;
    margin-bottom: 20px;
    padding: 16px;
    background: rgba(22,26,44,0.5);
    border: 1px solid var(--border);
    border-radius: 14px;
    align-items: center;
}
.url-quick-nav-label {
    font-size: 10px;
    font-weight: 700;
    letter-spacing: 0.14em;
    text-transform: uppercase;
    color: var(--muted);
    width: 100%;
    margin-bottom: 4px;
}
.url-chip {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    padding: 5px 12px;
    border-radius: 8px;
    font-size: 12px;
    font-weight: 600;
    background: rgba(108,140,255,0.1);
    border: 1px solid rgba(108,140,255,0.2);
    color: var(--primary);
    text-decoration: none !important;
    transition: all 0.2s;
    font-family: 'JetBrains Mono', monospace;
}
.url-chip:hover {
    background: rgba(108,140,255,0.2) !important;
    color: #a5b8ff !important;
    transform: translateY(-1px);
}
.url-chip.accent { background: rgba(255,138,76,0.1); border-color: rgba(255,138,76,0.2); color: var(--accent); }
.url-chip.accent:hover { background: rgba(255,138,76,0.2) !important; color: #ffb380 !important; }
.url-chip.success { background: rgba(74,222,128,0.1); border-color: rgba(74,222,128,0.2); color: var(--success); }
</style>

<div style="padding: 12px 24px; background: rgba(13,15,26,0.5); border-bottom: 1px solid rgba(255,255,255,0.05);">
    <div class="url-quick-nav">
        <div class="url-quick-nav-label">Quick Navigation</div>
        <a href="/" class="url-chip">⏳ Waiting Room</a>
        <a href="/home/" class="url-chip">🏠 Home</a>
        <a href="/leaderboard/" class="url-chip">🏆 Leaderboard</a>
        <a href="/finished/" class="url-chip accent">🏁 Finished</a>
    </div>
</div>
{% endblock %}
