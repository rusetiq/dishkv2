<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hackathon | Round 2 Complete</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;700;800;900&display=swap');

        :root {
            --bg: #0e0e0e;
            --primary: #00e676;
            --accent: #ff8a4c;
            --gold: #ffd700;
            --border: rgba(255, 255, 255, 0.08);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Inter', sans-serif;
            background: #0e0e0e;
            color: white;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            text-align: center;
            padding: 24px;
            overflow: hidden;
        }

        /* Blobs — same as waiting room */
        .blob {
            position: fixed;
            border-radius: 50%;
            filter: blur(120px);
            opacity: 0.15;
            z-index: 0;
            animation: float 16s ease-in-out infinite;
        }
        .blob-1 {
            width: 500px; height: 500px;
            top: -150px; left: -150px;
            background: var(--gold);
        }
        .blob-2 {
            width: 500px; height: 500px;
            bottom: -150px; right: -150px;
            background: var(--primary);
            animation-duration: 20s;
            animation-direction: reverse;
        }
        @keyframes float {
            0%, 100% { transform: translate(0, 0); }
            50% { transform: translate(30px, -30px); }
        }

        /* Content */
        .content {
            position: relative;
            z-index: 10;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 20px;
            max-width: 480px;
            width: 100%;
        }

        /* Trophy icon with pulse ring */
        .trophy-wrap {
            position: relative;
            width: 80px;
            height: 80px;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .trophy-ring {
            position: absolute;
            inset: 0;
            border-radius: 50%;
            border: 2px solid rgba(255, 215, 0, 0.4);
            animation: ring-ping 2s ease-out infinite;
        }
        .trophy-ring-2 {
            animation-delay: 0.6s;
        }
        @keyframes ring-ping {
            0% { transform: scale(1); opacity: 0.6; }
            100% { transform: scale(2.2); opacity: 0; }
        }
        .trophy-icon {
            width: 80px;
            height: 80px;
            border-radius: 50%;
            background: linear-gradient(135deg, rgba(255, 215, 0, 0.2), rgba(255, 165, 0, 0.1));
            border: 1px solid rgba(255, 215, 0, 0.3);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 36px;
            position: relative;
            z-index: 1;
            animation: trophy-glow 3s ease-in-out infinite alternate;
        }
        @keyframes trophy-glow {
            from { box-shadow: 0 0 20px rgba(255, 215, 0, 0.2); }
            to   { box-shadow: 0 0 40px rgba(255, 215, 0, 0.5); }
        }

        /* Badge */
        .badge {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            padding: 5px 14px;
            border-radius: 999px;
            border: 1px solid rgba(255, 215, 0, 0.25);
            background: rgba(255, 215, 0, 0.07);
            font-size: 11px;
            font-weight: 700;
            letter-spacing: 0.12em;
            text-transform: uppercase;
            color: var(--gold);
        }
        .badge-dot {
            width: 6px; height: 6px;
            border-radius: 50%;
            background: var(--gold);
        }

        h1 {
            font-size: clamp(28px, 7vw, 42px);
            font-weight: 900;
            line-height: 1.1;
        }
        h1 span {
            background: linear-gradient(135deg, #ffd700, #ff8a4c);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
        }

        .subtitle {
            color: #94a3b8;
            font-size: 15px;
            line-height: 1.6;
            max-width: 360px;
        }

        /* Divider */
        .divider {
            width: 100%;
            height: 1px;
            background: linear-gradient(to right, transparent, rgba(255,255,255,0.1), transparent);
        }

        /* Stats row */
        .stats {
            display: flex;
            gap: 12px;
            width: 100%;
        }
        .stat-box {
            flex: 1;
            padding: 16px;
            border-radius: 14px;
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid var(--border);
            display: flex;
            flex-direction: column;
            gap: 4px;
        }
        .stat-box .lbl {
            font-size: 10px;
            font-weight: 700;
            letter-spacing: 0.12em;
            text-transform: uppercase;
            color: #64748b;
        }
        .stat-box .val {
            font-size: 22px;
            font-weight: 800;
            color: white;
        }
        .stat-box .val.gold { color: var(--gold); }
        .stat-box .val.green { color: var(--primary); }

        /* Leaderboard button */
        

        /* Footer */
        .footer {
            margin-top: 8px;
            font-size: 11px;
            color: #334155;
            letter-spacing: 0.05em;
        }

        /* Confetti particles */
        .particle {
            position: fixed;
            width: 6px;
            height: 6px;
            border-radius: 1px;
            z-index: 5;
            animation: fall linear forwards;
            pointer-events: none;
        }
        @keyframes fall {
            0%   { transform: translateY(-20px) rotate(0deg); opacity: 1; }
            100% { transform: translateY(110vh) rotate(720deg); opacity: 0; }
        }

        /* Fade in */
        .content > * {
            animation: fadeUp 0.5s ease-out backwards;
        }
        .content > *:nth-child(1) { animation-delay: 0.1s; }
        .content > *:nth-child(2) { animation-delay: 0.2s; }
        .content > *:nth-child(3) { animation-delay: 0.3s; }
        .content > *:nth-child(4) { animation-delay: 0.4s; }
        .content > *:nth-child(5) { animation-delay: 0.45s; }
        .content > *:nth-child(6) { animation-delay: 0.5s; }
        .content > *:nth-child(7) { animation-delay: 0.55s; }
        .content > *:nth-child(8) { animation-delay: 0.6s; }
        @keyframes fadeUp {
            from { opacity: 0; transform: translateY(16px); }
            to   { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>
<body>

<div class="blob blob-1"></div>
<div class="blob blob-2"></div>

<div class="content">

    <div class="trophy-wrap">
        <div class="trophy-ring"></div>
        <div class="trophy-ring trophy-ring-2"></div>
        <div class="trophy-icon">🏆</div>
    </div>

    <span class="badge">
        <span class="badge-dot"></span>
        Round 2 Complete
    </span>

    <h1>Hackathon <span>Round 2</span><br>Completed!</h1>

    <p class="subtitle">
        The clock has stopped. Every submission is locked in.<br>
        Check the leaderboard to see where your team landed.
    </p>

    <div class="divider"></div>

    <div class="stats">
        <div class="stat-box">
            <div class="lbl">⏱ Duration</div>
            <div class="val gold">2:00:00</div>
        </div>
        <div class="stat-box">
            <div class="lbl">📋 Your Score</div>
            <div class="val green">{{ total_score }} pts</div>
        </div>
    </div>



    <p class="footer">Built for champions • Hackathon Arena</p>

</div>

<script>
    // Confetti burst on load
    const colors = ['#ffd700', '#ff8a4c', '#00e676', '#6c8cff', '#ff5d6c', '#fff'];
    function spawnParticle() {
        const p = document.createElement('div');
        p.className = 'particle';
        p.style.left = Math.random() * 100 + 'vw';
        p.style.background = colors[Math.floor(Math.random() * colors.length)];
        p.style.animationDuration = (Math.random() * 2.5 + 2) + 's';
        p.style.animationDelay = (Math.random() * 2) + 's';
        p.style.width = p.style.height = (Math.random() * 6 + 4) + 'px';
        document.body.appendChild(p);
        setTimeout(() => p.remove(), 5000);
    }
    // Spawn 60 particles over 2 seconds
    for (let i = 0; i < 60; i++) {
        setTimeout(spawnParticle, i * 35);
    }
</script>

</body>
</html>
