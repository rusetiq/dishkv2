{% extends "admin/base.html" %}
{% load i18n %}

{% block title %}DIS Admin — {{ title }}{% endblock %}

{% block branding %}
<div id="site-name">
    <a href="{% url 'admin:index' %}" style="display:flex;align-items:center;gap:10px;text-decoration:none;">
        <div style="width:32px;height:32px;border:1px solid rgba(255,122,0,0.4);border-radius:3px;display:flex;align-items:center;justify-content:center;">
            <svg viewBox="0 0 22 22" fill="none" width="16" height="16">
                <polyline points="8,4 2,11 8,18" stroke="#ff7a00" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
                <polyline points="14,4 20,11 14,18" stroke="#e1306c" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
            </svg>
        </div>
        <span style="font-family:'DM Mono',monospace;font-weight:800;font-size:14px;color:#e2dfe6;letter-spacing:0.12em;">DIS <span style="color:#ff7a00;">ADMIN</span></span>
    </a>
</div>
{% endblock %}

{% block nav-global %}
{% load static %}
<link rel="stylesheet" href="{% static 'css/admin-fonts.css' %}">
<style>
:root {
    --bg: #07050b;
    --surface: #0e0a16;
    --surface-2: #161122;
    --border: rgba(255,255,255,0.06);
    --primary: #ff7a00;
    --accent: #e1306c;
    --success: #3cd070;
    --danger: #ff5577;
    --text: #e2dfe6;
    --muted: #8b8599;
}
body {
    font-family: 'DM Mono', monospace !important;
    background: var(--bg) !important;
    color: var(--text) !important;
}
#header {
    background: var(--surface) !important;
    border-bottom: 1px solid var(--border) !important;
    padding: 0 24px !important;
    height: 60px !important;
    display: flex !important;
    align-items: center !important;
    backdrop-filter: blur(20px) !important;
}
#header a:link, #header a:visited { color: var(--text) !important; }
#user-tools { font-size: 12px !important; color: var(--muted) !important; }
#user-tools a { color: var(--primary) !important; }
#site-name a { color: var(--text) !important; }
.module h2, .module caption, .inline-group h2 {
    background: var(--surface-2) !important;
    color: var(--text) !important;
    border-bottom: 1px solid var(--border) !important;
    font-family: 'DM Mono', monospace !important;
    font-weight: 700 !important;
    letter-spacing: normal !important;
    padding: 12px 16px !important;
    font-size: 13px !important;
    text-transform: uppercase !important;
}
.module {
    background: var(--surface) !important;
    border: 1px solid var(--border) !important;
    border-radius: 3px !important;
    overflow: hidden !important;
    margin-bottom: 20px !important;
}
#content {
    background: transparent !important;
    padding: 24px !important;
}
#content-main {
    background: transparent !important;
}
#content h1 {
    font-family: 'DM Mono', monospace !important;
    font-weight: 800 !important;
    color: var(--text) !important;
    font-size: 20px !important;
    margin-bottom: 20px !important;
    text-transform: uppercase;
}
.colMS #content-related { background: transparent !important; }
#content-related h2 { font-family: 'DM Mono', monospace !important; color: var(--muted) !important; font-size: 11px !important; letter-spacing: 0.14em !important; text-transform: uppercase !important; }
#content-related .module {
    background: var(--surface) !important;
}
a:link, a:visited { color: var(--primary) !important; }
a:hover { color: #ffb366 !important; }
.button, input[type=submit], input[type=button], .submit-row input, a.button {
    background: var(--surface-2) !important;
    color: var(--text) !important;
    border: 1px solid var(--border) !important;
    border-radius: 3px !important;
    font-weight: 700 !important;
    font-family: 'DM Mono', monospace !important;
    padding: 6px 14px !important;
    cursor: pointer !important;
    transition: all 0.15s !important;
    box-shadow: none !important;
    text-transform: uppercase !important;
    font-size: 11px !important;
}
.button:hover, input[type=submit]:hover, input[type=button]:hover {
    background: rgba(255, 255, 255, 0.05) !important;
    border-color: rgba(255, 255, 255, 0.2) !important;
}
.button.default, input[type=submit].default {
    background: linear-gradient(135deg, #ff7a00, #e1306c) !important;
    color: #fff !important;
    border: none !important;
}
.button.default:hover, input[type=submit].default:hover {
    opacity: 0.95 !important;
}
.deletelink, a.deletelink { background: rgba(255,85,119,0.1) !important; color: var(--danger) !important; border: 1px solid rgba(255,85,119,0.2) !important; border-radius: 3px !important; }
.deletelink:hover { background: rgba(255,85,119,0.2) !important; }
input[type=text], input[type=password], input[type=email], input[type=url], input[type=number], textarea, select {
    background: #07050b !important;
    border: 1px solid var(--border) !important;
    color: var(--text) !important;
    border-radius: 3px !important;
    font-family: 'DM Mono', monospace !important;
    padding: 6px 10px !important;
}
input[type=text]:focus, textarea:focus, select:focus { border-color: var(--primary) !important; outline: none !important; }
#changelist-filter {
    background: var(--surface) !important;
    border-left: 1px solid var(--border) !important;
}
#changelist-filter h2 { background: transparent !important; border-bottom: 1px solid var(--border) !important; color: var(--muted) !important; font-size: 10px !important; text-transform: uppercase !important; letter-spacing: 0.14em !important; }
#changelist-filter li.selected a { color: var(--primary) !important; }
table {
    border-radius: 3px !important;
    overflow: hidden !important;
}
thead th {
    background: var(--surface-2) !important;
    color: var(--muted) !important;
    font-size: 11px !important;
    font-weight: 700 !important;
    letter-spacing: 0.1em !important;
    text-transform: uppercase !important;
    border-bottom: 1px solid var(--border) !important;
}
tbody tr { background: transparent !important; }
tbody tr:hover { background: rgba(255,255,255,0.02) !important; }
td, th { border-color: var(--border) !important; color: var(--text) !important; }
.paginator a, .paginator span { color: var(--primary) !important; }
#nav-sidebar { background: var(--surface) !important; border-right: 1px solid var(--border) !important; }
.toggle-nav-sidebar-icon { color: var(--primary) !important; }
.app-platform_app.model-problem.active a { color: var(--accent) !important; }
.breadcrumbs {
    background: transparent !important;
    border-bottom: 1px solid var(--border) !important;
    color: var(--muted) !important;
    font-size: 12px !important;
    padding: 10px 24px !important;
}
.breadcrumbs a { color: var(--primary) !important; }
.success, .warning, .errornote {
    border-radius: 3px !important;
    font-family: 'DM Mono', monospace !important;
    font-size: 13px !important;
    border: none !important;
}
.success { background: rgba(60,208,112,0.1) !important; color: #3cd070 !important; border-left: 3px solid #3cd070 !important; }
.errornote { background: rgba(255,85,119,0.1) !important; color: #ff5577 !important; border-left: 3px solid #ff5577 !important; }
.submit-row {
    background: var(--surface) !important;
    border-top: 1px solid var(--border) !important;
    border-radius: 0 0 3px 3px !important;
    padding: 14px 16px !important;
}
.help {
    color: var(--muted) !important;
    font-size: 11px !important;
}
.dashboard-quick-actions {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
    gap: 12px;
    margin-bottom: 24px;
}
.qa-btn {
    display: inline-flex;
    align-items: center;
    gap: 8px;
    padding: 10px 16px;
    border-radius: 3px;
    border: 1px solid var(--border);
    background: var(--surface-2);
    color: var(--text);
    text-decoration: none !important;
    font-weight: 700;
    font-size: 12px;
    font-family: 'DM Mono', monospace;
    transition: background 0.15s, border-color 0.15s;
    cursor: pointer;
}
.qa-btn:hover {
    border-color: rgba(255,255,255,0.2) !important;
    background: rgba(255,255,255,0.05) !important;
    color: var(--text) !important;
}
.qa-btn.danger:hover {
    border-color: rgba(255,85,119,0.3) !important;
    background: rgba(255,85,119,0.08) !important;
}
.qa-btn.success-btn:hover {
    border-color: rgba(60,208,112,0.3) !important;
    background: rgba(60,208,112,0.08) !important;
}
.qa-icon {
    width: 36px;
    height: 36px;
    border-radius: 3px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 18px;
    flex-shrink: 0;
}
.qa-icon.blue { background: rgba(108,140,255,0.15); }
.qa-icon.green { background: rgba(74,222,128,0.15); }
.qa-icon.red { background: rgba(255,93,108,0.15); }
.qa-icon.gold { background: rgba(255,215,0,0.15); }
.qa-label { display: flex; flex-direction: column; gap: 2px; }
.qa-label-main { font-weight: 700; font-size: 13px; }
.qa-label-sub { font-size: 11px; color: var(--muted); font-weight: 500; }
.url-quick-nav {
    display: flex;
    flex-wrap: wrap;
    gap: 8px;
    margin-bottom: 10px;
    padding: 12px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 3px;
    align-items: center;
}
.url-quick-nav-label {
    font-size: 10px;
    font-weight: 700;
    letter-spacing: 0.14em;
    text-transform: uppercase;
    color: var(--muted);
    width: 100%;
    margin-bottom: 4px;
}
.url-chip {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    padding: 6px 12px;
    border-radius: 3px;
    font-size: 11px;
    font-weight: 600;
    background: var(--surface-2);
    border: 1px solid var(--border);
    color: var(--text) !important;
    text-decoration: none !important;
    transition: background 0.15s;
    font-family: 'DM Mono', monospace;
}
.url-chip:hover {
    background: rgba(255,255,255,0.05) !important;
    border-color: rgba(255,255,255,0.2) !important;
}
.url-chip.accent { background: var(--surface-2); border-color: var(--border); color: var(--accent) !important; }
.url-chip.success { background: var(--surface-2); border-color: var(--border); color: var(--success) !important; }
</style>

<div style="padding: 12px 24px; background: var(--bg); border-bottom: 1px solid var(--border);">
    <div class="url-quick-nav">
        <div class="url-quick-nav-label">Quick Navigation</div>
        <a href="/" class="url-chip">⏳ Waiting Room</a>
        <a href="/home/" class="url-chip">🏠 Home</a>
        <a href="/leaderboard/" class="url-chip">🏆 Leaderboard</a>
        <a href="/finished/" class="url-chip accent">🏁 Finished</a>
    </div>
</div>
{% endblock %}
